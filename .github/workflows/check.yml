name: Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: |
            /nix/store
            ~/.cache/nix
          key: ${{ runner.os }}-nix-${{ hashFiles('flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-nix-

      - name: Check flake
        run: nix flake check --show-trace

      - name: Verify lib exports
        run: nix eval .#lib --apply builtins.attrNames

      - name: Verify nixosModules export
        run: |
          nix eval .#nixosModules.default --apply 'x: "ok"'

      - name: Verify homeModules export
        run: |
          nix eval .#homeModules.default --apply 'x: "ok"'

      - name: Verify built-in themes load
        run: |
          nix eval .#lib --apply 'lib: builtins.attrNames (lib.loadAllThemes { builtinRoot = builtins.toString ./themes; userRoot = null; })'

      - name: Summary
        if: always()
        run: |
          echo "## Check Results" >> $GITHUB_STEP_SUMMARY
          echo "Flake check status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
